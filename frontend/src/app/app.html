<div class="min-h-screen bg-gray-50 p-4 sm:p-6 lg:p-8">
  <ng-container *ngIf="isLoggedIn; else loginTemplate">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 flex items-center">
        
        LeedTech Fee Payment
      </h1>
      <button (click)="logout()" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition w-full sm:w-auto">
        Logout
      </button>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <app-payment-form></app-payment-form>
      <app-dashboard></app-dashboard>
    </div>
  </ng-container>
  <ng-template #loginTemplate>
    <app-login></app-login>
  </ng-template>
</div>
